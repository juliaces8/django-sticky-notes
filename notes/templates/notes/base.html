{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'notes/style.css' %}">
</head>
<body>
    <div class="container">
        <header class="text-center mb-5">
            <h1>📌 My Sticky Notes</h1>
            <div class="mb-3">
                <a href="{% url 'note_list' %}" class="btn btn-outline-secondary">View All</a>
                <a href="{% url 'note_create' %}" class="btn btn-primary">+ New Note</a>
            </div>
        </header>

        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
